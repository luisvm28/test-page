
# 1. Trigger: Se ejecuta automáticamente al hacer cambios en la rama 'main'
trigger:
  - main

# Define que usaremos el repositorio actual
resources:
  - repo: self


# 2. Variables del entorno
variables:
  - group: CICD
  - name: appVersion
    value: $[variables.appVersion]

parameters:
  - name: tag 
    default: '$(Build.BuildId)'
  - name: imageName
    default: 'test-page' 

stages:
- stage: Build
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool: local-agent

    steps:
    - task: Docker@2
      displayName: Build an image
      inputs:
        repository: ${{ parameters.imageName }}
        command: build
        dockerfile: '**/Dockerfile'
        tags: ${{ parameters.tag }}
        arguments: '--build-arg VERSION="$(appVersion)"'
        containerRegistry: registryConnection

    - task: Docker@2
      displayName: Push to ACR
      inputs:
        command: Push
        containerRegistry: registryConnection
        repository: ${{ parameters.imageName }}
        tags: ${{ parameters.tag }} 