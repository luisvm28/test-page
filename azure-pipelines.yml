
# 1. Trigger: Se ejecuta automáticamente al hacer cambios en la rama 'main'
trigger:
  - main

# Define que usaremos el repositorio actual
resources:
  - repo: self


# 2. Variables del entorno
variables:
  - group: CICD
  - name: appVersion
    value: $[variables.appVersion]

parameters:
  - name: tag 
    default: '$(Build.BuildId)'
  - name: imageName
    default: 'test-page' 

stages:
- stage: CICD
  displayName: CICD workflow 
  jobs:
  - job: Build
    displayName: Build
    pool: local-agent

    steps:
    - task: Docker@2
      displayName: Build an image
      inputs:
        repository: ${{ parameters.imageName }}
        command: build
        dockerfile: '**/Dockerfile'
        tags: ${{ parameters.tag }}
        arguments: '--build-arg VERSION="$(appVersion)"'
        containerRegistry: registryConnection

    - task: Docker@2
      displayName: Push to ACR
      inputs:
        command: Push
        containerRegistry: registryConnection
        repository: ${{ parameters.imageName }}
        tags: ${{ parameters.tag }} 

  - job: Deploy 
    displayName: Deploy 
    dependsOn: Build
    pool: local-agent
    steps:
      - task: AzureContainerApps@1

        inputs:
          azureSubscription: 'appDeployConnection'
          imageToDeploy: acrtestpage.azurecr.io/${{ parameters.imageName }}:${{ parameters.tag }}

          containerAppName: 'app-test-page' # NOMBRE DEL CONTAINER APP
          resourceGroup: rg-devops

          acrUsername: $(acrUsername)
          acrPassword: $(acrPassword)
          
        