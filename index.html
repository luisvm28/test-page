<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD en AzureDevops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background-color: #0b0f19; /* Deep dark blue background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevents scrolling from the blurred shapes */
            position: relative;
        }

        /* 1. Northern Lights Blur Effect */
        .northern-lights {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .light {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.6;
            animation: drift 10s infinite alternate ease-in-out;
        }

        .light-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: #00ffcc; /* Cyan */
            animation-delay: 0s;
        }

        .light-2 {
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: #7b2cbf; /* Purple */
            animation-delay: -3s;
        }

        .light-3 {
            top: 20%;
            right: 20%;
            width: 40vw;
            height: 40vw;
            background: #39ff14; /* Neon Green */
            opacity: 0.4;
            animation-delay: -5s;
        }

        /* Subtle floating animation for the lights */
        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -50px) scale(1.1); }
        }

        /* 2. Smooth Background Pattern */
        .pattern-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 1;
        }

        /* 3. Glassmorphism Content Card */
        .content-wrapper {
            position: relative;
            z-index: 2; /* Keeps text above the lights and pattern */
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.2;
            /* Colorful Text Gradient */
            background: linear-gradient(to right, #00ffcc, #b088f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.25rem;
            font-weight: 400;
            color: #a0aec0;
            letter-spacing: 0.5px;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
            .glass-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="northern-lights">
        <div class="light light-1"></div>
        <div class="light light-2"></div>
        <div class="light light-3"></div>
    </div>

    <div class="pattern-overlay"></div>

    <main class="content-wrapper">
        <div class="glass-card">
            <h1>Prueba de CI/CD en AzureDevops</h1>
            <p>by &lt;LUIS VEGA MADRIGAL&gt;</p>
        </div>
    </main>

</body>
</html>
